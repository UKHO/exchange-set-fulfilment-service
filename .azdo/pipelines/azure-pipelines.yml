name: $(BuildDefinitionName)_$(SourceBranchName)_$(Date:yyyyMMdd).$(BuildCounter)

parameters:
  - name: DisableStryker
    displayName: "Disable Stryker"
    type: boolean
    default: false

  - name: DisableSnyk
    displayName: "Disable Snyk"
    type: boolean
    default: false

trigger:
  - main

pool: NautilusBuild

variables:
  - name: BuildConfiguration
    value: "Release"
  - name: BuildPlatform
    value: "any cpu"
  - name: BuildCounter
    value: $[counter(format('{0:yyyyMMdd}', pipeline.startTime), 1)]
  - name: UkhoAssemblyCompany
    value: "UK Hydrographic Office"
  - name: UkhoAssemblyVersionPrefix
    value: "1.0."
  - name: UkhoAssemblyProduct
    value: "ESS Fulfilment Service"
  - name: UKHOAssemblyCopyright
    value: "Copyright © UK Hydrographic Office"
  - name: SdkVersion
    value: "9.0.x"
  - name: WindowsPool
    value: "Mare Nubium"
  - name: snykAbzuOrganizationId
    value: b862e284-787d-4fd1-8007-23b7f976cde8 

stages:
  - stage: Stryker_Mutator
    displayName: "Stryker Mutator"
    condition: eq('${{ parameters.DisableStryker }}', false)
    dependsOn: []
    jobs:
      - job: Stryker
        workspace:
          clean: all
        steps:
          - task: UseDotNet@2
            displayName: 'Use .NET SDK 9.0.x'
            inputs:
              packageType: sdk
              version: 9.0.x
              installationPath: $(Agent.ToolsDirectory)/dotnet

          - task: DotNetCoreCLI@2
            displayName: "Install Stryker"
            inputs:
              command: custom
              custom: tool
              arguments: install dotnet-stryker --tool-path $(Agent.BuildDirectory)/tools

          - task: Powershell@2
            displayName: "Run Stryker for All UnitTests"
            inputs:
              targetType: 'inline'
              pwsh: true
              script: |
                # Use the installed .NET 9.0 SDK
                $env:DOTNET_ROOT = "$(Agent.ToolsDirectory)/dotnet"
                $env:PATH = "$env:DOTNET_ROOT;$env:PATH"

                # Run Stryker for Orchestrator UnitTests
                $(Agent.BuildDirectory)/tools/dotnet-stryker --test-project $(Build.SourcesDirectory)/test/UKHO.ADDS.EFS.Orchestrator.UnitTests/UKHO.ADDS.EFS.Orchestrator.UnitTests.csproj --output $(Build.SourcesDirectory)/mutation-reports/orchestrator

                # Run Stryker for Builder S100 UnitTests
                $(Agent.BuildDirectory)/tools/dotnet-stryker --test-project $(Build.SourcesDirectory)/test/UKHO.ADDS.EFS.Builder.S100.UnitTests/UKHO.ADDS.EFS.Builder.S100.UnitTests.csproj --output $(Build.SourcesDirectory)/mutation-reports/builder-s100

          - task: PublishMutationReport@0
            displayName: "Publish Stryker Reports for All UnitTests"
            inputs:
              reportPattern: '$(Build.SourcesDirectory)/mutation-reports/**/mutation-report.html'
              reportDisplayName: 'Combined Stryker Mutation Reports'      

  - stage: BuildTest
    displayName: "Build and Test"
    dependsOn: []
    jobs:
    - template: templates/build-test-publish.yml
