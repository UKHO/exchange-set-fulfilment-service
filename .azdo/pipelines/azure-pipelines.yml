parameters:
- name: DestroyResources
  displayName: "Destroy Environment"
  type: boolean
  default: false
- name: AzdDebug
  displayName: "Debug azd"
  type: boolean
  default: false

trigger:
- main

pool: Mare Nectaris

variables:
#- group: ESS-Deployment-Variables-DEV
- group: EFS-Dev-Test

stages:
- stage: Deploy
  displayName: Deploy to dev
  dependsOn: []
  jobs:
  - job: AzdDeploy
    displayName: Deploy with azd
    workspace:
      clean: all
    variables:
    - name: AZD_INITIAL_ENVIRONMENT_CONFIG
      value: '{"AZURE_ENV_NAME": "$(AZURE_ENV_NAME)", "AZURE_LOCATION": "$(AZURE_LOCATION)", "AZURE_SUBSCRIPTION_ID": "$(AZURE_SUBSCRIPTION_ID)"}'
    steps:
    - checkout: self
      clean: true

    - script: git submodule update --init --recursive
      displayName: Restore mock submodule
      workingDirectory: '$(Build.SourcesDirectory)'
  
    - script: |
        #az upgrade --yes
        curl -fsSL https://aka.ms/install-azd.sh | bash
        azd version
        azd config set auth.useAzCliAuth "true"
      displayName: Install azd

    - task: UseDotNet@2
      inputs:
        version: '9.x'
      displayName: Set up .NET 9

    - task: DotNetCoreCLI@2
      displayName: NuGet restore for non test projects only
      inputs:
        command: restore
        projects: '**/*.csproj'
        feedsToUse: config
        noCache: true
        nugetConfigPath: '$(Build.SourcesDirectory)/BuildNuget.config'
        workingDirectory: '$(Build.SourcesDirectory)/src'
        packagesDirectory: '$(Build.SourcesDirectory)/src/packages'

    - ${{ if eq(parameters.DestroyResources, true) }}:

      - task: AzureCLI@2
        displayName: Destroy infrastructure
        inputs:
          #azureSubscription: Aspire-Test
          azureSubscription: Exchange-Set-Service-Dev-A-008-02
          scriptType: bash
          scriptLocation: inlineScript
          keepAzSessionActive: true
          ${{ if eq(parameters.AzdDebug, true) }}:
            inlineScript: |
              azd down --no-prompt --force --purge --debug
          ${{ else }}:
            inlineScript: |
              azd down --no-prompt --force --purge
        env:
          AZURE_SUBSCRIPTION_ID: $(AZURE_SUBSCRIPTION_ID)
          AZURE_ENV_NAME: $(AZURE_ENV_NAME)
          AZURE_LOCATION: $(AZURE_LOCATION)
          #MSBUILDDEBUGENGINE: 1

    - ${{ else }}:

      # - task: Docker@2
      #   displayName: Build and push Docker image
      #   inputs:
      #     command: buildAndPush
      #     containerRegistry: Exchange-Set-Service-Dev-A-008-02
      #     repository: $(BuilderAcrName).azurecr.io/efs-builder-s100
      #     dockerfile: $(Build.SourcesDirectory)/src/UKHO.ADDS.EFS.Builder.S100/Dockerfile
      #     tags: efs-builder-s100

      - task: AzureCLI@2
        displayName: Download files from Azure Storage
        inputs:
          azureSubscription: Exchange-Set-Service-Dev-A-008-02
          scriptType: bash
          scriptLocation: inlineScript
          inlineScript: |
            az storage blob download --container-name $StorageContainerName --name root2.tar.gz --file $(Build.SourcesDirectory)/src/UKHO.ADDS.EFS.Builder.S100/root2.tar.gz --auth-mode key
            az storage blob download --container-name $StorageContainerName --name xchg-2.7.war --file $(Build.SourcesDirectory)/src/UKHO.ADDS.EFS.Builder.S100/xchg-2.7.war --auth-mode key
        env:
          AZURE_STORAGE_ACCOUNT: $(BuilderFilesSa)
          StorageContainerName: $(BuilderFilesContainer)
          AZURE_STORAGE_KEY: $(BuilderFilesSaKey)

      - task: AzureCLI@2
        displayName: Build and push Docker image to ACR
        inputs:
          azureSubscription: Exchange-Set-Service-Dev-A-008-02
          scriptType: bash
          scriptLocation: inlineScript
          inlineScript: |
            echo "Logging in to Azure Container Registry..."
            az acr login --name $ACR_NAME

            echo "Changing directory..."
            cd $(Build.SourcesDirectory)/src

            echo "Building Docker image..."
            docker build -t $ACR_NAME.azurecr.io/efs-builder-s100:${BUILD_TAG} -f UKHO.ADDS.EFS.Builder.S100/Dockerfile .

            echo "Pushing Docker image to Azure Container Registry..."
            docker push $ACR_NAME.azurecr.io/efs-builder-s100:${BUILD_TAG}
        env:
          ACR_NAME: $(BuilderAcrName)
          BUILD_TAG: $(Build.BuildId)

      # - task: AzureCLI@2
      #   displayName: Infrastructure and deploy
      #   inputs:
      #     #azureSubscription: Aspire-Test
      #     azureSubscription: Exchange-Set-Service-Dev-A-008-02
      #     scriptType: bash
      #     scriptLocation: inlineScript
      #     keepAzSessionActive: true
      #     ${{ if eq(parameters.AzdDebug, true) }}:
      #       inlineScript: |
      #         azd up --no-prompt --debug
      #     ${{ else }}:
      #       inlineScript: |
      #         azd up --no-prompt
      #   env:
      #     AZURE_SUBSCRIPTION_ID: $(AZURE_SUBSCRIPTION_ID)
      #     AZURE_ENV_NAME: $(AZURE_ENV_NAME)
      #     AZURE_LOCATION: $(AZURE_LOCATION)
      #     AZD_INITIAL_ENVIRONMENT_CONFIG: $(AZD_INITIAL_ENVIRONMENT_CONFIG)
      #     MSBUILDDEBUGENGINE: 1

      # - task: AzureCLI@2
      #   displayName: Generate infra
      #   inputs:
      #     #azureSubscription: Aspire-Test
      #     azureSubscription: Exchange-Set-Service-Dev-A-008-02
      #     scriptType: bash
      #     scriptLocation: inlineScript
      #     keepAzSessionActive: true
      #     ${{ if eq(parameters.AzdDebug, true) }}:
      #       inlineScript: |
      #         azd init --no-prompt --debug
      #         azd infra gen --no-prompt --debug
      #     ${{ else }}:
      #       inlineScript: |
      #         azd init --no-prompt
      #         azd infra gen --no-prompt
      #   env:
      #     AZURE_SUBSCRIPTION_ID: $(AZURE_SUBSCRIPTION_ID)
      #     AZURE_ENV_NAME: $(AZURE_ENV_NAME)
      #     AZURE_LOCATION: $(AZURE_LOCATION)

      - task: AzureCLI@2
        displayName: Provision infrastructure
        inputs:
          #azureSubscription: Aspire-Test
          azureSubscription: Exchange-Set-Service-Dev-A-008-02
          scriptType: bash
          scriptLocation: inlineScript
          keepAzSessionActive: true
          ${{ if eq(parameters.AzdDebug, true) }}:
            inlineScript: |
              azd provision --no-prompt --debug
          ${{ else }}:
            inlineScript: |
              azd provision --no-prompt
        env:
          AZURE_SUBSCRIPTION_ID: $(AZURE_SUBSCRIPTION_ID)
          AZURE_ENV_NAME: $(AZURE_ENV_NAME)
          AZURE_LOCATION: $(AZURE_LOCATION)
          #AZD_INITIAL_ENVIRONMENT_CONFIG: $(AZD_INITIAL_ENVIRONMENT_CONFIG)
          #MSBUILDDEBUGENGINE: 1

      - task: AzureCLI@2
        displayName: Deploy application
        inputs:
          #azureSubscription: Aspire-Test
          azureSubscription: Exchange-Set-Service-Dev-A-008-02
          scriptType: bash
          scriptLocation: inlineScript
          keepAzSessionActive: true
          ${{ if eq(parameters.AzdDebug, true) }}:
            inlineScript: |
              azd deploy --no-prompt --debug
          ${{ else }}:
            inlineScript: |
              azd deploy --no-prompt
        env:
          AZURE_SUBSCRIPTION_ID: $(AZURE_SUBSCRIPTION_ID)
          AZURE_ENV_NAME: $(AZURE_ENV_NAME)
          AZURE_LOCATION: $(AZURE_LOCATION)
          #AZD_DEBUG_DOTNET_APPHOST_USE_FIXED_MANIFEST: true
          #MSBUILDDEBUGENGINE: 1
          #MSBUILDDEBUGPATH: '$(Build.SourcesDirectory)/msbuilddebug'

