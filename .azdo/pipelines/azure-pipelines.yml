parameters:
- name: DestroyResources
  displayName: "Destroy Environment"
  type: boolean
  default: false
- name: AzdDebug
  displayName: "Debug azd"
  type: boolean
  default: true

trigger:
- main

pool: Mare Nectaris

variables:
#- group: ESS-Deployment-Variables-DEV
- group: EFS-Dev-Test

stages:
- stage: Deploy
  displayName: Deploy to dev
  dependsOn: []
  jobs:
  - job: AzdDeploy
    displayName: Deploy with azd
    workspace:
      clean: all
    variables:
    - name: AZD_INITIAL_ENVIRONMENT_CONFIG
      value: '{"AZURE_ENV_NAME": "$(AZURE_ENV_NAME)", "AZURE_LOCATION": "$(AZURE_LOCATION)", "AZURE_SUBSCRIPTION_ID": "$(AZURE_SUBSCRIPTION_ID)"}'
    steps:
    - checkout: self
      clean: true

    - script: git submodule update --init --recursive
      displayName: Restore mock submodule
      workingDirectory: '$(Build.SourcesDirectory)'
  
    - script: |
        #az upgrade --yes
        curl -fsSL https://aka.ms/install-azd.sh | bash
        azd version
        azd config set auth.useAzCliAuth "true"
      displayName: Install azd

    - task: UseDotNet@2
      inputs:
        version: '9.x'
      displayName: Set up .NET 9

    - ${{ if eq(parameters.DestroyResources, true) }}:

      - task: AzureCLI@2
        displayName: Destroy infrastructure
        inputs:
          azureSubscription: Aspire-Test
          #azureSubscription: Exchange-Set-Service-Dev-A-008-02
          scriptType: pscore
          scriptLocation: inlineScript
          keepAzSessionActive: true
          ${{ if eq(parameters.AzdDebug, true) }}:
            inlineScript: |
              azd down --no-prompt --force --purge --debug
          ${{ else }}:
            inlineScript: |
              azd down --no-prompt --force --purge
        env:
          AZURE_SUBSCRIPTION_ID: $(AZURE_SUBSCRIPTION_ID)
          AZURE_ENV_NAME: $(AZURE_ENV_NAME)
          AZURE_LOCATION: $(AZURE_LOCATION)
          #MSBUILDDEBUGENGINE: 1

    - ${{ else }}:

      # - task: AzureCLI@2
      #   displayName: Infrastructure and deploy
      #   inputs:
      #     azureSubscription: Aspire-Test
      #     #azureSubscription: Exchange-Set-Service-Dev-A-008-02
      #     scriptType: pscore
      #     scriptLocation: inlineScript
      #     keepAzSessionActive: true
      #     ${{ if eq(parameters.AzdDebug, true) }}:
      #       inlineScript: |
      #         azd up --no-prompt --debug
      #     ${{ else }}:
      #       inlineScript: |
      #         azd up --no-prompt
      #   env:
      #     AZURE_SUBSCRIPTION_ID: $(AZURE_SUBSCRIPTION_ID)
      #     AZURE_ENV_NAME: $(AZURE_ENV_NAME)
      #     AZURE_LOCATION: $(AZURE_LOCATION)
      #     AZD_INITIAL_ENVIRONMENT_CONFIG: $(AZD_INITIAL_ENVIRONMENT_CONFIG)
      #     MSBUILDDEBUGENGINE: 1

      # - task: AzureCLI@2
      #   displayName: Generate infra
      #   inputs:
      #     azureSubscription: Aspire-Test
      #     #azureSubscription: Exchange-Set-Service-Dev-A-008-02
      #     scriptType: pscore
      #     scriptLocation: inlineScript
      #     keepAzSessionActive: true
      #     ${{ if eq(parameters.AzdDebug, true) }}:
      #       inlineScript: |
      #         azd init --no-prompt --debug
      #         azd infra gen --no-prompt --debug
      #     ${{ else }}:
      #       inlineScript: |
      #         azd init --no-prompt
      #         azd infra gen --no-prompt
      #   env:
      #     AZURE_SUBSCRIPTION_ID: $(AZURE_SUBSCRIPTION_ID)
      #     AZURE_ENV_NAME: $(AZURE_ENV_NAME)
      #     AZURE_LOCATION: $(AZURE_LOCATION)

      - task: AzureCLI@2
        displayName: Provision infrastructure
        inputs:
          azureSubscription: Aspire-Test
          #azureSubscription: Exchange-Set-Service-Dev-A-008-02
          scriptType: pscore
          scriptLocation: inlineScript
          keepAzSessionActive: true
          inlineScript: |
            az acr login --name acrxaj2x3kjawory
            dotnet publish $(Build.SourcesDirectory)/src/UKHO.ADDS.EFS.Orchestrator/UKHO.ADDS.EFS.Orchestrator.csproj -r linux-x64 -c Release /t:PublishContainer -p:ContainerRepository=exchange-set-fulfilment-service/efs-orchestrator-dev -p:ContainerImageTag=azd-deploy-1749467082 -p:ContainerRegistry=acrxaj2x3kjawory.azurecr.io --getProperty:GeneratedContainerConfiguration
        env:
          AZURE_SUBSCRIPTION_ID: $(AZURE_SUBSCRIPTION_ID)
          AZURE_ENV_NAME: $(AZURE_ENV_NAME)
          AZURE_LOCATION: $(AZURE_LOCATION)
          #AZD_INITIAL_ENVIRONMENT_CONFIG: $(AZD_INITIAL_ENVIRONMENT_CONFIG)
          #MSBUILDDEBUGENGINE: 1
