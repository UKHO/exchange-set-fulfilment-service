# Health check validation YAML for post-deployment
parameters:
# The name of the service connection for deployment.
- name: AzureSubscription
  type: string
# The base URL for the deployed application (if known)
- name: AppBaseUrl
  type: string
  default: ""
# The Azure environment name for dynamic URL construction
- name: AzureEnvName
  type: string
  default: "$(AZURE_ENV_NAME)"
# Timeout in minutes for health check
- name: HealthCheckTimeoutMinutes
  type: number
  default: 5
# Sleep time between retries in seconds
- name: SleepTimeSeconds
  type: number
  default: 30
# Initial delay before first check in seconds
- name: InitialDelaySeconds
  type: number
  default: 60
# Continue on error flag
- name: OnErrorContinue
  type: boolean
  default: false

steps:
- task: AzureCLI@2
  displayName: 'Health Check Validation'
  inputs:
    azureSubscription: ${{ parameters.AzureSubscription }}
    scriptType: bash
    scriptLocation: inlineScript
    inlineScript: |
      echo "Starting health check validation for EFS Orchestrator"
      
      # Determine the base URL - either from parameter or construct dynamically
      if [ -n "${{ parameters.AppBaseUrl }}" ] && [ "${{ parameters.AppBaseUrl }}" != "" ]; then
        BASE_URL="${{ parameters.AppBaseUrl }}"
        echo "Using provided base URL: $BASE_URL"
      else
        # Construct URL from Azure environment
        ENV_NAME="${{ parameters.AzureEnvName }}"
        if [ -z "$ENV_NAME" ]; then
          ENV_NAME="$AZURE_ENV_NAME"
        fi
        
        # Get Container App Environment Domain from AZD
        echo "Reading azd variables to get container app domain..."
        eval $(azd env get-values | sed 's/^/export /')

        if [ -n "$AZURE_CONTAINER_APPS_ENVIRONMENT_DEFAULT_DOMAIN" ]; then
          BASE_URL="https://efs-orchestrator--$ENV_NAME.$AZURE_CONTAINER_APPS_ENVIRONMENT_DEFAULT_DOMAIN"
           #BASE_URL= "https://adds-mocks-efs.ashymushroom-d9976f65.uksouth.azurecontainerapps.io/fss"
          echo "Constructed base URL: $BASE_URL"
        else
          echo "No AZURE_CONTAINER_APPS_ENVIRONMENT_DEFAULT_DOMAIN found. Trying Azure CLI fallback..."
          FQDN=$(az containerapp show \
            --name efs-orchestrator \
            --resource-group "efs-$ENV_NAME-rg" \
            --query properties.configuration.ingress.fqdn -o tsv || echo "")
          if [ -n "$FQDN" ]; then
            BASE_URL="https://$FQDN"
            echo "Constructed base URL from container app: $BASE_URL"
          else
            echo "Could not determine BASE_URL. Please provide AppBaseUrl parameter."
            exit 1
          fi
        fi
      fi
      
      # Validate BASE_URL format
      if [[ ! "$BASE_URL" =~ ^https?:// ]]; then
        echo "Invalid BASE_URL: $BASE_URL"
        exit 1
      fi

      # Initial delay before health checks
      echo "Waiting ${{ parameters.InitialDelaySeconds }} seconds before starting health checks..."
      sleep ${{ parameters.InitialDelaySeconds }}
      
      perform_health_check_with_timeout() {
        local url=$1
        local endpoint=$2
        local timeout_minutes=${{ parameters.HealthCheckTimeoutMinutes }}
        local sleep_seconds=${{ parameters.SleepTimeSeconds }}
        local full_url="${url}${endpoint}"
        
        echo "Polling URL: $full_url"
        echo "  Timeout: ${timeout_minutes}min"
        echo "  Sleep: ${sleep_seconds}s"
        
        local timeout_seconds=$((timeout_minutes * 60))
        local elapsed_seconds=0
        local is_healthy="false"
        
        while [ $elapsed_seconds -lt $timeout_seconds ]; do
          echo "Health check attempt at ${elapsed_seconds}s/${timeout_seconds}s"
          
          # Use curl with verbose output for debugging
          response=$(curl -v -s -w "\nHTTPSTATUS:%{http_code}" \
            --connect-timeout 10 \
            --max-time 30 \
            -H "Accept: application/json" \
            "$full_url" 2>&1 || echo "HTTPSTATUS:000")
          
          http_code=$(echo "$response" | tr -d '\n' | sed -e 's/.*HTTPSTATUS://')
          body=$(echo "$response" | sed -e 's/HTTPSTATUS\:.*//g')
          
          echo "HTTP Status: $http_code"
          
          # Print connection details from verbose output for debugging
          if [ "$http_code" != "200" ]; then
            echo "Curl debug output:"
            echo "$response" | grep -E "^* "
            echo "Response body:"
            echo "$body"
          fi
          
          if [ "$http_code" -eq 200 ]; then
            echo "Service is healthy"
            is_healthy="true"
            break
          else
            if [ "$http_code" -eq 000 ]; then
              echo "Connection failed. This might indicate network issues or service not ready."
            else
              echo "Service returned non-200 status code: $http_code"
            fi
            echo "Waiting ${sleep_seconds}s before retry..."
          fi
          
          sleep $sleep_seconds
          elapsed_seconds=$((elapsed_seconds + sleep_seconds))
        done
        
        if [ "$is_healthy" = "true" ]; then
          return 0
        else
          echo "Service was not healthy within ${timeout_minutes} minutes"
          return 1
        fi
      }
      
      # Main health check execution
      HEALTH_CHECK_FAILED=false
      
      echo "=== EFS Orchestrator Health Check ==="
      if perform_health_check_with_timeout "$BASE_URL" "/health"; then
        echo "Health check passed"
      else
        HEALTH_CHECK_FAILED=true
      fi
      
      # Final result
      if [ "$HEALTH_CHECK_FAILED" = true ]; then
        echo ""
        echo "Health check failed. Deployment validation unsuccessful."
        echo "   Please check the application logs and ensure the service is running correctly."
        
        # Handle error continuation
        if [ "${{ parameters.OnErrorContinue }}" = "true" ]; then
          echo "OnErrorContinue=true, pipeline will continue despite health check failures"
          exit 0
        else
          echo "OnErrorContinue=false, failing the pipeline"
          exit 1
        fi
      else
        echo ""
        echo "Health check passed. Deployment validation successful."
        echo "EFS Orchestrator is ready to accept traffic."
        exit 0
      fi
  env:
    AZURE_SUBSCRIPTION_ID: $(AZURE_SUBSCRIPTION_ID)
    AZURE_ENV_NAME: $(AZURE_ENV_NAME)
    AZURE_LOCATION: $(AZURE_LOCATION)
